# docker-compose.yml — Базовая версия (CPU)
# Безопасный запуск для любой системы.
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  model-puller:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        echo 'Ожидание запуска Ollama...';
        until ollama list > /dev/null 2>&1; do sleep 3; done;
        echo 'Скачивание модели qwen2.5-coder:7b-instruct-q4_K_M...';
        ollama pull qwen2.5-coder:7b-instruct-q4_K_M;
        echo 'Модель готова.'
      "
    depends_on:
      ollama:
        condition: service_healthy
    restart: on-failure

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "qwen2.5-coder:7b-instruct-q4_K_M"
      MAX_RETRIES: "3"
      DRY_RUN: "false" # Lua 5.5 компилируется прямо в Dockerfile!
    depends_on:
      ollama:
        condition: service_healthy
      model-puller:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  ollama_data:
